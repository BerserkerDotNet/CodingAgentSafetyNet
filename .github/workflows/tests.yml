name: Tests

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - ".github/plugins/**"
      - "tests/**"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run tests
        shell: pwsh
        run: ./tests/guard-dangerous-ops.tests.ps1
